<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Jardín Digital</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%); overflow: hidden; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="flowerCanvas"></canvas>
<script>
    const canvas = document.getElementById('flowerCanvas');
    const ctx = canvas.getContext('2d');
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize);
    resize();

    function drawFlower(x, y, petals, maxRadius, color) {
        let currentRadius = 0;
        function animate() {
            if (currentRadius < maxRadius) {
                ctx.save();
                // Dibujar tallo
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.quadraticCurveTo(x + 20, y + 50, x, canvas.height);
                ctx.strokeStyle = '#2d5a27';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Dibujar Flor
                ctx.translate(x, y);
                ctx.beginPath();
                ctx.fillStyle = color;
                for (let i = 0; i < petals * 60; i++) {
                    let angle = i * 0.1;
                    let r = currentRadius * Math.cos((petals / 2) * angle);
                    ctx.lineTo(r * Math.cos(angle), r * Math.sin(angle));
                }
                ctx.fill();
                
                // Centro
                ctx.beginPath();
                ctx.arc(0, 0, currentRadius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = '#FFD700';
                ctx.fill();
                ctx.restore();
                
                currentRadius += 2;
                requestAnimationFrame(animate);
            }
        }
        animate();
    }

    canvas.addEventListener('pointerdown', (e) => {
        const hue = Math.random() * 360;
        drawFlower(e.clientX, e.clientY, Math.floor(Math.random() * 5) + 5, Math.random() * 30 + 30, `hsl(${hue}, 80%, 60%)`);
    });
</script>
</body>
</html>
