<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Jardín de Santiago</title>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(circle, #1a1a2e 0%, #050505 100%); 
            overflow: hidden; 
            touch-action: none;
            font-family: 'Arial', sans-serif;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="flowerCanvas"></canvas>

<script>
    const canvas = document.getElementById('flowerCanvas');
    const ctx = canvas.getContext('2d');

    let flowers = [];
    let particles = [];
    let santiago = { angle: 0 };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.size = Math.random() * 3 + 2;
            this.speedX = Math.random() * 2 + 0.5;
            this.speedY = Math.random() * 1 - 0.5;
            this.life = 1;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY + Math.sin(this.x / 30) * 0.5;
            this.life -= 0.008;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    class Tulip {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.maxSize = Math.random() * 20 + 30;
            this.size = 0;
            this.angleOffset = Math.random() * 1000;
            this.leafSide = Math.random() > 0.5 ? 1 : -1;
        }

        draw(time) {
            let wind = Math.sin(time / 1000 + this.angleOffset) * 12;
            let currentY = this.y + (this.maxSize - this.size);

            ctx.save();
            // 1. TALLO
            ctx.beginPath();
            ctx.moveTo(this.x, canvas.height);
            ctx.quadraticCurveTo(this.x + wind, (this.y + canvas.height) / 2, this.x + wind * 1.5, this.y);
            ctx.strokeStyle = '#2d5a27';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 2. HOJA
            ctx.save();
            ctx.translate(this.x + wind * 0.7, (this.y + canvas.height) / 1.5);
            ctx.rotate((this.leafSide * 30 + wind) * Math.PI / 180);
            ctx.beginPath();
            ctx.fillStyle = '#3a7d32';
            ctx.ellipse(0, 0, 25, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // 3. TULIPÁN (Forma de copa)
            ctx.translate(this.x + wind * 1.5, this.y);
            ctx.fillStyle = this.color;
            
            // Pétalos laterales
            ctx.beginPath();
            ctx.ellipse(-this.size/2.5, -this.size/2, this.size/2, this.size, -0.2, 0, Math.PI * 2);
            ctx.ellipse(this.size/2.5, -this.size/2, this.size/2, this.size, 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Pétalo central
            ctx.beginPath();
            ctx.ellipse(0, -this.size/2, this.size/1.8, this.size, 0, 0, Math.PI * 2);
            ctx.fill();

            // Base verde del tulipán
            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#2d5a27';
            ctx.fill();

            ctx.restore();

            if (this.size < this.maxSize) {
                this.size += 0.8;
                if (Math.random() > 0.9) {
                    particles.push(new Particle(this.x + wind * 1.5, this.y, this.color));
                }
            }
        }
    }

    function animate(time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // NOMBRE SANTIAGO
        santiago.angle += 0.02;
        let sx = (canvas.width / 2) + Math.cos(santiago.angle) * 40;
        let sy = 120 + Math.sin(santiago.angle * 0.5) * 20;
        
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = "white";
        ctx.fillStyle = "white";
        ctx.font = "bold 45px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Santiago", sx, sy);
        ctx.restore();

        // FLORES Y PARTÍCULAS
        flowers.forEach(f => f.draw(time));
        particles.forEach((p, i) => {
            p.update();
            p.draw();
            if (p.life <= 0) particles.splice(i, 1);
        });

        requestAnimationFrame(animate);
    }

    canvas.addEventListener('pointerdown', (e) => {
        const hue = Math.random() * 360;
        flowers.push(new Tulip(e.clientX, e.clientY, `hsl(${hue}, 80%, 60%)`));
    });

    requestAnimationFrame(animate);
</script>
</body>
</html>
